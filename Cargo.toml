[workspace]
members = [
    "crates/contract",
    "crates/kernel",
    "crates/builtin",
    "crates/demo",
]
resolver = "2"

[workspace.dependencies]
async-trait = "0.1"
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt", "fs"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
bitflags = "2.13.0"
mvp-contract = { path = "crates/contract" }
mvp-kernel = { path = "crates/kernel" }
mvp-builtin = { path = "crates/builtin" }
